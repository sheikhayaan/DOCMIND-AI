name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        # Tests are offline (no Groq/Pinecone/network calls), so they run in CI
        # without any API keys. Dummy env values satisfy module-level config.
        env:
          PINECONE_INDEX_NAME: ci-test-index
          GROQ_API_KEY: ci-dummy-key
          PINECONE_API_KEY: ci-dummy-key
        run: python -m pytest tests/ -v

  frontend:
    name: Frontend typecheck, lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint app components lib

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npx next build
